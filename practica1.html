<!DOCTYPE html>
<!--
No es una etiqueta como tal, es una declaración.
Le dice al navegador que el documento está escrito en HTML5.
Ayuda a que el navegador interprete correctamente el código.
-->

<html lang="es">
    <!-- Es la etiqueta raíz; todo el contenido va dentro.
    html contiene toda la página.
    lang="es" indica que el idioma del contenido es español (es = Spanish). -->

    <head>
    <!-- Contiene información sobre la página, pero no se ve directamente en el contenido.
    Aquí van configuraciones como: Título...
    Es como la “configuración” de la página. -->

    <meta charset="UTF-8">
    <!-- Define la codificación de caracteres.
    UTF-8 permite mostrar correctamente: tildes (á, é), ñ (ñ), símbolos (@, €, °)
    Sin esto podrían salir caracteres raros. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea responsive (adaptable a móviles).
    width=device-width: el ancho de la página se ajusta al ancho del dispositivo.
    initial-scale=1.0: el zoom inicial es del 100%. -->


    <title>Mi primera página web</title>
    <!-- Define el título de la página.
    Aparece en: La pestaña del navegador. Favoritos. Resultados de búsqueda. -->

</head>
    
<body>
    <!-- Aquí va todo lo visible para el usuario. -->
</body>
</html>
