<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Teoría:
La etiqueta ul crea una lista desordenada.
Se usa para agrupar elementos con viñetas.

La etiqueta li representa cada elemento de la lista.
Cada elemento debe ir dentro de la etiqueta ul.
-->

<ul> <!-- Inicio de lista desordenada -->
    <li>Elemento de lista 1</li> <!-- Primer elemento de la lista -->
    <li>Elemento de lista 2</li> <!-- Segundo elemento de la lista -->
    <li>Elemento de lista 3</li> <!-- Tercer elemento de la lista -->
</ul> <!-- Fin de la lista -->

    <a href="/practica8.html">volver</a>

</body>
</html>
