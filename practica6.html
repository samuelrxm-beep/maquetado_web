<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ol> <!-- Inicio de lista ordenada -->
        <li>Primer elemento de la lista ordenada</li> <!-- Primer elemento -->
        <li>Segundo elemento de la lista ordenada</li> <!-- Segundo elemento -->
        <li>Tercer elemento de la lista ordenada</li> <!-- Tercer elemento -->
    </ol> <!-- Fin de la lista ordenada -->

    <!-- Como diferenciar una lista ordenada de una desordenada -->
    <!-- La lista ordenada (ol) muestra los elementos con números o letras, indicando un orden específico. -->
    <!-- La lista desordenada (ul) muestra los elementos con viñetas, sin indicar un orden específico. -->
</body>
</html>
