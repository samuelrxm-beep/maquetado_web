<!DOCTYPE html> <!-- Declaración que indica que el documento usa HTML5 -->

<html lang="en"> <!-- Etiqueta raíz que contiene toda la estructura de la página -->

<head> <!-- Sección donde van configuraciones y metadatos -->

    <meta charset="UTF-8">
    <!-- Define la codificación UTF-8 para mostrar caracteres especiales como ñ, á, é -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Permite diseño responsive, adaptando la página a celulares y tablets -->

    <title>Document</title>
    <!-- Define el título mostrado en la pestaña del navegador -->

</head>

<body> <!-- Contiene todo el contenido visible para el usuario -->

    <!-- Teoría:
    Las etiquetas h1 a h6 son encabezados HTML.
    Se usan para organizar jerárquicamente la información.
    h1 es el título principal y h6 el menos importante.
    También ayudan en accesibilidad y posicionamiento SEO.
    -->

    <h1>Titulo principal o de primer orden</h1> 
    <!-- Encabezado principal de la página -->

    <h2>Subtitulo o de segundo orden</h2>
    <!-- Subtema relacionado con el título principal -->

    <h3>Subtitulo 2 o de tercer orden</h3>
    <!-- División de información dentro de un h2 -->

    <h4>Subtitulo 3 o de cuarto orden</h4>
    <!-- Nivel más específico dentro de la estructura -->

    <h5>Subtitulo 4 o de quinto orden</h5>
    <!-- Encabezado de menor jerarquía -->

    <h6>Subtitulo 5 o de sexto orden</h6>
    <!-- Último nivel de encabezados -->

    <!-- h$*6 es un atajo Emmet para generar automáticamente h1 hasta h6 -->

</body>

</html> <!-- Cierre del documento HTML -->
